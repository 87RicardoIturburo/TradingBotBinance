# TradingBot — Docker Compose (Producción)
# Uso: docker compose -f docker-compose.prod.yml up -d
# Variables sensibles en archivo .env (nunca commitear)

services:
  api:
    build:
      context: .
      dockerfile: src/TradingBot.API/Dockerfile
    container_name: tradingbot-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=tradingbot;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - BINANCE_USE_TESTNET=${BINANCE_USE_TESTNET:-true}
      - BINANCE_USE_DEMO=${BINANCE_USE_DEMO:-false}
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 256M
    volumes:
      - api-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: tradingbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tradingbot
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-backups:/backups
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tradingbot-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backup diario de PostgreSQL — se ejecuta a las 02:00 UTC
  pg-backup:
    image: postgres:16-alpine
    container_name: tradingbot-pg-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: tradingbot
    volumes:
      - postgres-backups:/backups
    entrypoint: >
      sh -c "while true; do
        sleep_until=$$(date -d 'tomorrow 02:00' +%s 2>/dev/null || date -v+1d -v2H -v0M -v0S +%s);
        now=$$(date +%s);
        sleep $$((sleep_until - now));
        echo \"[pg-backup] Starting backup...\";
        pg_dump -Fc > /backups/tradingbot-$$(date +%Y%m%d).dump;
        find /backups -name '*.dump' -mtime +7 -delete;
        echo \"[pg-backup] Backup completed, old backups cleaned.\";
      done"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

volumes:
  postgres-data:
    name: tradingbot-postgres-data
  postgres-backups:
    name: tradingbot-postgres-backups
  redis-data:
    name: tradingbot-redis-data
  api-logs:
    name: tradingbot-api-logs
